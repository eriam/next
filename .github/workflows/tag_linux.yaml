name: Tag release linux

on:
  push:
    tags:
      - "*"

env:
  SERVER: production

defaults:
  run:
    shell: bash
    working-directory: webstack/clients/electron

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: npm install --legacy-peer-deps
      - name: Build
        run: npx electron-packager ./ --platform=linux --arch=x64 --icon=s3.icns --overwrite --appCopyright="SAGE3 Team" --ignore="^/node_modules/electron-installer" --ignore="^/node_modules/electron-winstaller"
      - name: Chmod
        run: chmod +x SAGE3-linux-x64/SAGE3
      - name: Readme
        run: cp README.lnx SAGE3-linux-x64/README.txt
      - name: Tar files
        run: tar -cvf SAGE3-linux-x64.tar SAGE3-linux-x64
      - name: Zip files
        run: zip SAGE3-linux-x64.tar.zip SAGE3-linux-x64.tar
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: webstack/clients/electron/SAGE3-linux-x64.tar.zip
