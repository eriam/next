name: Webstack CI

on:
  push:
    branches:
      - dev
  pull_request:

defaults:
  run:
    shell: bash
    working-directory: webstack

jobs:
  run:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version:
          - 24

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Dependencies
        run: yarn install --network-timeout 600000 --silent

      - name: Run Tests
        run: yarn nx run-many --target=test --projects=sagebase,homebase --passWithNoTests

      - name: Build Homebase
        run: yarn build --if-present

      - name: Build Webapp
        run: yarn build webapp --if-present
