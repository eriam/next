server {
    listen 443 ssl;
    server_name sage3.sioal.local;

    ssl_certificate /etc/nginx/certs/localhost-server.crt;
    ssl_certificate_key /etc/nginx/certs/localhost-server.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 5G;

    # Docker DNS resolver
    resolver 127.0.0.11 valid=10s;

    # WebSocket support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;

    # YJS WebSocket
    location /yjs/ {
        set $yjs http://yjs-server:3002;
        proxy_pass $yjs;
    }

    # Files API
    location /api/files/ {
        set $files http://files-server:3003;
        proxy_pass $files;
    }


    # Internal auth check — validates session against node-server
    location = /_auth {
        internal;
        set $upstream http://node-server:443;
        proxy_pass $upstream/auth/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
    }

    # Assets API (uploads, static content)
    # Validate session via node-server, then proxy to files-server
    # with service JWT (strips cookie to avoid files-server auth bug).
    location = /api/assets {
        auth_request /_auth;
        set $files http://files-server:3003;
        proxy_set_header Authorization "Bearer eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJ0ZXN0MkBnbWFpbC5jb20iLCJuYW1lIjoidGVzdDIiLCJhZG1pbiI6ZmFsc2UsImlhdCI6MTcxODc1NjUyMywiZXhwIjoxNzUwMzE0MTIzLCJhdWQiOiJzYWdlMy5hcHAiLCJpc3MiOiJzYWdlM2FwcEBnbWFpbC5jb20ifQ.qHt_wdOwN8ZR7Eys4dyh_52fRR6KnINzw7f1lL0JYW1LMmmLZqm4IoFkupst4NTPO6VG03cCYo4nnD9leMeSckVKqM0dVvU1ctV2dPQxb5WORz8BsIAdZTEVDogXBHMHb4GvNmxcNoRxSvPEGRhCEPwkHHHEyf1icqNixoRPNmd81a6vTzcUpHovqX9kz01AoXicZNtbhMrIZv_l8Ab2bSjcwVebba4zjdCc8DaBfm9cEicX8NnmflJvnRDLAM3UmXLLeLoyVvnpYl6uZ6BJaBxeseykU0mRQXDyCdBYQuwZx3rCF1nbxLbleEypMQjwV9rvh7hNTwQsIbYOzLIilg";
        proxy_set_header Cookie "";
        proxy_set_header Connection "";
        proxy_set_header Upgrade "";
        proxy_pass $files;
    }
    location /api/assets/ {
        auth_request /_auth;
        set $files http://files-server:3003;
        proxy_set_header Authorization "Bearer eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJ0ZXN0MkBnbWFpbC5jb20iLCJuYW1lIjoidGVzdDIiLCJhZG1pbiI6ZmFsc2UsImlhdCI6MTcxODc1NjUyMywiZXhwIjoxNzUwMzE0MTIzLCJhdWQiOiJzYWdlMy5hcHAiLCJpc3MiOiJzYWdlM2FwcEBnbWFpbC5jb20ifQ.qHt_wdOwN8ZR7Eys4dyh_52fRR6KnINzw7f1lL0JYW1LMmmLZqm4IoFkupst4NTPO6VG03cCYo4nnD9leMeSckVKqM0dVvU1ctV2dPQxb5WORz8BsIAdZTEVDogXBHMHb4GvNmxcNoRxSvPEGRhCEPwkHHHEyf1icqNixoRPNmd81a6vTzcUpHovqX9kz01AoXicZNtbhMrIZv_l8Ab2bSjcwVebba4zjdCc8DaBfm9cEicX8NnmflJvnRDLAM3UmXLLeLoyVvnpYl6uZ6BJaBxeseykU0mRQXDyCdBYQuwZx3rCF1nbxLbleEypMQjwV9rvh7hNTwQsIbYOzLIilg";
        proxy_set_header Cookie "";
        proxy_set_header Connection "";
        proxy_set_header Upgrade "";
        proxy_pass $files;
    }

    # Everything else -> node-server
    location / {
        set $upstream http://node-server:443;
        proxy_pass $upstream;
    }
}
